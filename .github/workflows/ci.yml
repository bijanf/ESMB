name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest "jax[cpu]"

    - name: Run tests
      run: pytest -q

  quality:
    name: Code Quality (advisory)
    runs-on: ubuntu-latest
    # NOTE: the historical experiments/ and root scratch scripts carry a large
    # pre-existing style debt (whitespace, line length, unused imports). Until a
    # dedicated formatting pass lands, the style checks are ADVISORY (non-blocking)
    # and scoped to the core package + tests. The `test` job above is the hard gate.
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install tools
      run: pip install black isort flake8

    - name: Check formatting (black)
      run: black --check chronos_esm tests

    - name: Check imports (isort)
      run: isort --check-only --profile black chronos_esm tests

    - name: Lint (flake8)
      run: flake8 chronos_esm tests
