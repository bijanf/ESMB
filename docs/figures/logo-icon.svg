<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Chronos-ESM">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
  </defs>
  <!-- globe / clock face -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#cg)" stroke-width="5"/>
  <!-- meridian -->
  <ellipse cx="50" cy="50" rx="15" ry="42" fill="none" stroke="url(#cg)" stroke-width="2.4" opacity="0.85"/>
  <!-- dynamics wave (equator) -->
  <path d="M13 50 C22 41 30 41 39 50 C48 59 56 59 65 50 C71 44 79 43 87 48"
        fill="none" stroke="url(#cg)" stroke-width="3.4" stroke-linecap="round"/>
  <!-- time / sun moment marker on the rim -->
  <circle cx="80" cy="26" r="5" fill="url(#sun)"/>
</svg>
