<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 446 110" width="446" height="110" role="img" aria-label="Chronos-ESM — Differentiable Earth System Model">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="cgText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
  </defs>

  <!-- icon mark -->
  <g transform="translate(6,5)">
    <circle cx="50" cy="50" r="42" fill="none" stroke="url(#cg)" stroke-width="5"/>
    <ellipse cx="50" cy="50" rx="15" ry="42" fill="none" stroke="url(#cg)" stroke-width="2.4" opacity="0.85"/>
    <path d="M13 50 C22 41 30 41 39 50 C48 59 56 59 65 50 C71 44 79 43 87 48"
          fill="none" stroke="url(#cg)" stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="80" cy="26" r="5" fill="url(#sun)"/>
  </g>

  <!-- wordmark -->
  <text x="120" y="52" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" letter-spacing="-1" fill="url(#cgText)">Chronos<tspan fill="#64748b" font-weight="600">-ESM</tspan></text>
  <text x="122" y="78" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="10.5" font-weight="600" letter-spacing="1.9" fill="#64748b">DIFFERENTIABLE EARTH SYSTEM MODEL</text>
</svg>
